name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 192.168.17.130 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh cloudadmin@192.168.17.130 << 'EOF'
            cd ~/develops-project
            git pull origin main
            docker-compose down
            docker-compose up -d --build
          EOF

