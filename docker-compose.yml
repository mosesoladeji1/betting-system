version: "3"

services:
  backend:
    build: ./betting-backend
    container_name: backend
    ports:
      - "5000:5000"
    networks:
      - betting-network

  frontend:
    build: ./betting-frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - betting-network

networks:
  betting-network:

